<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>おばけ面談室 v23</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;background:#090b14;color:#fff}
#app{width:min(100vw,470px);height:100dvh;margin:0 auto;background:linear-gradient(#20263b,#0b0d16);overflow:hidden;position:relative}
.header{height:88px;padding:18px 12px 10px;display:grid;grid-template-columns:1fr 1fr 56px;gap:8px;background:#121624;border-bottom:1px solid rgba(255,255,255,.14)}
.card{border:1px solid rgba(255,255,255,.16);border-radius:18px;background:rgba(255,255,255,.06);padding:8px 12px}
.label{font-size:12px;color:#aeb6d1;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.value{font-size:28px;font-weight:1000;line-height:1}
button{font:inherit}
.pause{border:0;border-radius:18px;background:#b3f7dc;color:#111827;font-size:24px;font-weight:1000}
.screen{display:none;height:calc(100dvh - 88px);padding:16px}
.screen.on{display:block}
.titleBox,.paper,.resultBox{height:100%;border:1px solid rgba(255,255,255,.14);border-radius:26px;background:rgba(255,255,255,.08);padding:22px;display:flex;flex-direction:column;justify-content:center;text-align:center}
h1{font-size:46px;line-height:1.05;margin:0 0 16px}
.mainBtn{border:0;border-radius:18px;background:#b3f7dc;color:#111827;font-weight:1000;padding:16px;margin-top:18px;font-size:18px}
.sub{color:#cfd6ea;line-height:1.7;font-weight:800}
.debug{margin-top:14px;color:#b3f7dc;font-size:13px;font-weight:900;line-height:1.5}
.paper{background:#f4ecdc;color:#202231;text-align:left;justify-content:flex-start}
.paper h2{font-size:32px;margin:12px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;overflow:auto;padding-bottom:8px}
.field{border:1px solid rgba(32,34,49,.16);border-radius:14px;background:rgba(255,255,255,.48);padding:10px;min-height:66px}
.field.wide{grid-column:1/-1}
dt{font-size:12px;color:#6d5d63;font-weight:900}
dd{margin:4px 0 0;font-weight:900;line-height:1.45}
.footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.footer span{font-weight:900;color:#6d5d63}
.room{height:45%;position:relative;background:linear-gradient(#252b43 0 58%,#171a24 58%);border-bottom:1px solid rgba(255,255,255,.14);overflow:hidden;border-radius:0 0 18px 18px}
.ghost{position:absolute;left:50%;top:20px;transform:translateX(-50%);width:120px;height:160px;border-radius:65px 65px 28px 28px;background:linear-gradient(#f1fbff,rgba(241,251,255,.75));box-shadow:0 0 42px rgba(179,247,220,.32)}
.face{position:absolute;top:48px;left:0;right:0;text-align:center;color:#20263b;font-size:28px;font-weight:1000}
.speech{position:absolute;left:12px;right:12px;bottom:10px;border-radius:18px;background:rgba(246,248,252,.95);color:#151827;padding:12px 14px;font-weight:900;line-height:1.55;min-height:96px;max-height:128px;overflow:auto;z-index:2}
.choices{height:55%;padding:10px 0 0;display:grid;gap:9px;overflow:auto}
.choice{border:1px solid rgba(255,255,255,.14);border-radius:18px;background:rgba(255,255,255,.08);color:#fff;text-align:left;padding:14px;font-weight:900;font-size:16px;line-height:1.35;min-height:56px}
.choice:active,.mainBtn:active{transform:translateY(1px)}
.hidden{display:none!important}
.toast{position:absolute;left:14px;right:14px;bottom:18px;background:rgba(5,6,10,.9);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px 14px;font-weight:900;z-index:9}
.log{position:absolute;left:12px;right:12px;bottom:112px;max-height:68px;overflow:auto;border-radius:14px;background:rgba(0,0,0,.25);padding:8px 10px;font-size:12px;color:#d8e0f2;line-height:1.45}
.badge{display:inline-block;margin-right:6px;color:#b3f7dc;font-weight:1000}
.overlay{position:absolute;inset:0;background:rgba(5,6,10,.72);display:grid;place-items:center;z-index:20;padding:24px}
.overlayCard{background:#f6f8ff;color:#151827;border-radius:24px;padding:22px;text-align:center;width:100%}
.choiceText{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.choiceNum{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:8px;background:rgba(179,247,220,.18);color:#b3f7dc;margin-right:8px;flex:0 0 auto}
.choice.inner{display:flex;align-items:center}

/* v21 UI final-ish */
.room{height:46%;background:linear-gradient(#252b43 0 60%,#171a24 60%)}
.ghost{top:8px;width:126px;height:166px;box-shadow:0 0 52px rgba(179,247,220,.34)}
.speech{bottom:10px;min-height:106px;max-height:132px;border-radius:20px}
.log{bottom:122px;max-height:72px}
.choice{min-height:62px;max-height:68px;display:flex;align-items:center;gap:8px;overflow:hidden}
@media(max-height:720px){
  .ghost{top:0;transform:translateX(-50%) scale(.88);transform-origin:top center}
  .speech{min-height:94px;max-height:112px}
  .choice{min-height:56px;max-height:60px;font-size:14px}
}

/* v23 layout fix: prevent bottom choices from being cut off */
#game.screen.on{
  display:flex;
  flex-direction:column;
  min-height:0;
  padding:0 12px calc(12px + env(safe-area-inset-bottom)) !important;
}
#game .room{
  flex:0 0 42%;
  height:auto;
  min-height:245px;
}
#game > div[style*="display:flex"]{
  flex:0 0 auto;
  margin:8px 0 !important;
}
#game .choices{
  flex:1 1 auto;
  height:auto;
  min-height:0;
  overflow-y:auto;
  padding:0 0 12px;
  align-content:start;
}
#game .choice{
  min-height:58px;
  max-height:none;
}
#game .speech{
  min-height:94px;
  max-height:120px;
}
#game .log{
  bottom:112px;
  max-height:58px;
}
@media(max-height:760px){
  #game .room{flex-basis:39%;min-height:220px}
  #game .ghost{top:0;transform:translateX(-50%) scale(.82);transform-origin:top center}
  #game .speech{min-height:84px;max-height:104px;font-size:14px}
  #game .log{display:none}
  #game .choice{min-height:52px;font-size:14px;padding:10px 12px}
}
@media(max-height:660px){
  #game .room{flex-basis:35%;min-height:190px}
  #game .speech{min-height:78px;max-height:94px}
}

</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="card"><div class="label">成仏/失敗</div><div class="value" id="score">0/0</div></div>
    <div class="card"><div class="label" id="timerLabel">待機</div><div class="value"><span id="timer">--</span><small>秒</small></div></div>
    <button class="pause" id="pauseBtn">Ⅱ</button>
  </div>
  <section id="title" class="screen on">
    <div class="titleBox">
      <h1>おばけ<br>面談室</h1>
      <p class="sub">v23：選択肢の下切れ修正＋結果分析強化版。<br>v22を土台に、遊びやすさと最後の分析を改善。</p>
      <button id="startBtn" class="mainBtn">面談を始める</button>
      <p id="debug" class="debug">JS確認中...</p>
      <p class="sub" style="font-size:12px;margin-top:10px">UI修正＋結果分析強化</p>
    </div>
  </section>
  <section id="resume" class="screen">
    <article class="paper">
      <div style="display:inline-block;border:2px solid #bd4d4d;color:#bd4d4d;border-radius:8px;padding:6px 10px;font-weight:1000;transform:rotate(-2deg)">霊界面談 履歴書</div>
      <h2 id="rName">---</h2>
      <dl class="grid">
        <div class="field"><dt>性別</dt><dd id="rGender">---</dd></div>
        <div class="field"><dt>享年</dt><dd id="rAge">---</dd></div>
        <div class="field"><dt>死因</dt><dd id="rCause">---</dd></div>
        <div class="field"><dt>未練</dt><dd id="rRegret">---</dd></div>
        <div class="field wide"><dt id="itemLabel">遺品</dt><dd id="rItem">---</dd></div>
        <div class="field wide"><dt id="memoLabel">面談前の様子</dt><dd id="rMemo">---</dd></div>
      </dl>
      <div class="footer"><span>20秒後に入室します</span><button id="skipBtn" class="mainBtn" style="margin-top:0">すぐ面談</button></div>
    </article>
  </section>
  <section id="game" class="screen" style="padding:0 12px 12px">
    <div class="room">
      <div class="ghost"><div class="face" id="face">；_；</div></div>
      <div id="log" class="log hidden"></div>
      <div class="speech" id="speech">---</div>
    </div>
    <div style="display:flex;gap:8px;margin:10px 0">
      <div class="card" style="flex:1"><div class="label" id="hp">成仏HP -- / 不信HP --</div></div>
      <div class="card"><div class="label" id="round">--/150</div></div>
    </div>
    <div class="choices" id="choices"></div>
  </section>
  <section id="result" class="screen">
    <div class="resultBox">
      <h1 id="resultTitle">終了</h1>
      <p class="sub" id="resultText">---</p>
      <div class="value" id="finalScore">0</div>
      <div id="compat" class="sub" style="font-size:14px"></div>
      <button id="restartBtn" class="mainBtn">もう一度</button>
    </div>
  </section>
  <div id="pauseOverlay" class="overlay hidden">
    <div class="overlayCard">
      <h2>一時停止中</h2>
      <p>面談室の時計を止めています。</p>
      <button id="resumeBtn" class="mainBtn">再開</button>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>
</div>
<script>

(function(){
  "use strict";
  function $(id){ return document.getElementById(id); }
  function clamp(n,a,b){ return Math.max(a, Math.min(b, n)); }
  function pick(arr, n){ return arr[Math.abs(n)%arr.length]; }
  function hash(s){ var h=2166136261; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
  function rng(seed){ var t=seed>>>0; return function(){ t+=0x6D2B79F5; var x=t; x=Math.imul(x^x>>>15,x|1); x^=x+Math.imul(x^x>>>7,x|61); return ((x^x>>>14)>>>0)/4294967296; }; }
  function shuffle(a, seed){ a=a.slice(); var r=rng(seed); for(var i=a.length-1;i>0;i--){ var j=Math.floor(r()*(i+1)); var tmp=a[i]; a[i]=a[j]; a[j]=tmp; } return a; }
  function safe(s){ return String(s).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }

  var screens = {title:$("title"), resume:$("resume"), game:$("game"), result:$("result")};
  var els = {
    score:$("score"), timer:$("timer"), timerLabel:$("timerLabel"), startBtn:$("startBtn"),
    skipBtn:$("skipBtn"), restartBtn:$("restartBtn"), debug:$("debug"), rName:$("rName"),
    rGender:$("rGender"), rAge:$("rAge"), rCause:$("rCause"), rRegret:$("rRegret"),
    rItem:$("rItem"), rMemo:$("rMemo"), speech:$("speech"), face:$("face"), choices:$("choices"),
    hp:$("hp"), round:$("round"), resultTitle:$("resultTitle"), resultText:$("resultText"),
    finalScore:$("finalScore"), toast:$("toast"), log:$("log"), compat:$("compat"),
    pauseBtn:$("pauseBtn"), pauseOverlay:$("pauseOverlay"), resumeBtn:$("resumeBtn"),
    itemLabel:$("itemLabel"), memoLabel:$("memoLabel")
  };
  var CONFIG = {resumeTime:20, answerTime:30, maxFails:3, ghostCount:150, version:"v23"};

  var maleNames = ["蓮","直人","拓海","悠真","和也","修平","健太","春樹","宗介","亮","大地","誠","航","伊吹","圭吾","智也","蒼太","慎"];
  var femaleNames = ["伊織","美咲","紗季","凛","千尋","真由","絵里","菜月","灯","澪","弥生","小春","遥","鈴音","杏奈","ゆかり","志乃","琴音"];
  var neutralNames = ["ナギ","アオ","ミチ","リツ","トワ","ヒナタ","カナメ","スイ","ユウ","セナ","シオン","カイ","ノア","ルカ"];
  var causes = ["事故","病気","過労","行方不明","災害","転落","水難","古い怪異","原因不明"];
  var faces = ["；_；","・へ・","╥_╥","・_・",">_<","・ω・",";-;","´･_･`","；へ；","・×・"];
  var typeTags = ["ISTJ","ISFJ","INFJ","INTJ","ISTP","ISFP","INFP","INTP","ESTP","ESFP","ENFP","ENTP","ESTJ","ESFJ","ENFJ","ENTJ"];
  var typeWants = {ISTJ:"logic",ISFJ:"care",INFJ:"listen",INTJ:"logic",ISTP:"listen",ISFP:"memory",INFP:"listen",INTP:"logic",ESTP:"anger",ESFP:"chat",ENFP:"hope",ENTP:"chat",ESTJ:"closure",ESFJ:"care",ENFJ:"inherit",ENTJ:"inherit"};
  var regrets = [
    {name:"家族", item:"折りたたまれた買い物メモ", witness:"家族の話になると玄関の方を見る。", speech:"家に帰る途中だったんです。買い物袋の中身だけ、妙にはっきり覚えています。", want:"care"},
    {name:"仕事", item:"角の折れた作業ノート", witness:"時間の話になると背筋が伸びる。", speech:"机の上だけ片づけて帰りました。あれで本当に終われたのか、まだ考えています。", want:"logic"},
    {name:"夢", item:"擦り切れたチケット半券", witness:"未来の話になると少し早口になる。", speech:"向いてなかったのか、続ける根性がなかったのか、まだ分かりません。", want:"hope"},
    {name:"孤独", item:"未開封の飴玉", witness:"人の気配にはすぐ反応する。", speech:"誰も来ないのは慣れていたはずなのに、最後の日だけ寂しかった。", want:"listen"},
    {name:"怒り", item:"破れた領収書", witness:"穏やかに話すほど指先が震える。", speech:"許したことになっているのが、いちばん腹立たしいんです。", want:"anger"},
    {name:"思い出", item:"小さな缶バッジ", witness:"好きなものの話だけ少し目が明るい。", speech:"くだらないものばかり集めていたと言われました。でも、私には大事でした。", want:"memory"},
    {name:"約束", item:"止まった腕時計", witness:"時間を聞かれると顔を伏せる。", speech:"約束の場所には行けませんでした。相手が待っていたかも分かりません。", want:"closure"},
    {name:"罪悪感", item:"折れた鍵", witness:"自分を責める言葉だけすらすら出る。", speech:"謝る相手を間違えた気がします。誰に謝ればいいのかも分からない。", want:"scold"},
    {name:"継承", item:"書きかけのノート", witness:"途中という言葉に強く反応する。", speech:"途中で止まったものを、置いていくのが怖いんです。", want:"inherit"},
    {name:"雑談", item:"古い喫茶店のレシート", witness:"本題を避けるように小さな話をする。", speech:"本題の前に、少しだけ関係ない話をしてもいいですか。", want:"chat"}
  ];
  var modeReplies = {
    chat:{finish:"最後に普通の話ができて、やっと帰れます。", react:"面談って、もっと怖いものかと思ってました。", q:"面談なのに、笑っても怒られませんか。"},
    scold:{finish:"ちゃんと怒ってくれて、やっと自分のしたことを見られました。", react:"今の、少し痛いです。でも逃げなくて済みます。", q:"怒られたら楽になるなんて、変ですか。"},
    vent:{finish:"聞いてもらえたら、思ったより軽くなりました。", react:"正しくなくても、聞いてもらえるんですね。", q:"きれいごとにする前に、もっと文句を言っていいですか。"},
    listen:{finish:"急かされなかったから、置いていけます。", react:"黙って待ってくれるの、助かります。", q:"沈黙しても、ここにいていいですか。"},
    logic:{finish:"筋道が見えたら、やっと足が動きます。", react:"もう少し分けて考えたら、見えそうです。", q:"原因を一つずつ見るなら、どこからですか。"},
    closure:{finish:"ここで終わりにします。今度こそ自分で閉じられます。", react:"終わらせるって、冷たいことじゃないんですね。", q:"終わらせるって、逃げることとは違いますか。"},
    care:{finish:"見てくれる人がいたなら、もう十分です。", react:"そんなふうに見てもらえるとは思いませんでした。", q:"私のしてきたこと、無駄じゃなかったんでしょうか。"},
    memory:{finish:"その小さな記憶ごと、持って行っていいんですね。", react:"そうです。そういう小さいことが、ずっと残っていて。", q:"こんな小さい思い出で泣くの、変ですか。"},
    hope:{finish:"叶わなかった未来にも、意味があったんですね。", react:"少しだけ、先の話をしてもいいんですね。", q:"まだ未来の話をしてもいいんでしょうか。"},
    inherit:{finish:"続きは誰かに渡していいんですね。肩の力が抜けました。", react:"誰かに渡すって、投げ出すこととは違うんですか。", q:"途中で渡すのは、投げ出すことですか。"},
    anger:{finish:"怒っていいと言われて、やっと力が抜けました。", react:"きれいにしなくていいんですね。", q:"許したことにしなくても、いいんですか。"}
  };

  var choiceBank = [
    {text:"何が引っかかっているか、分けましょう。", tag:"logic", role:"pull"},
    {text:"その話、最後まで聞きます。", tag:"listen", role:"pull"},
    {text:"そこまでしたことは、ちゃんと残っています。", tag:"care", role:"pull"},
    {text:"叶わなかった時間も、失敗だけじゃないです。", tag:"hope", role:"pull"},
    {text:"少しだけ、関係ない話をしましょうか。", tag:"chat", role:"pull"},
    {text:"それ、腹が立って当然です。", tag:"anger", role:"pull"},
    {text:"ここで区切っても大丈夫です。", tag:"closure", role:"pull"},
    {text:"小さい思い出ほど、残っていいんです。", tag:"memory", role:"pull"},
    {text:"その続きは、誰かに渡してもいいんです。", tag:"inherit", role:"pull"},
    {text:"逃げたことまで、なかったことにしなくていいです。", tag:"scold", role:"pull"},
    {text:"続きから聞かせてください。", tag:"watch", role:"watch"},
    {text:"すぐには決めつけません。", tag:"watch", role:"watch"},
    {text:"今はまだ、結論を出さずに聞きます。", tag:"watch", role:"watch"},
    {text:"前向きに考えた方がいいです。", tag:"bad", role:"distrust"},
    {text:"もう終わったことですよね。", tag:"bad", role:"distrust"},
    {text:"誰にでもあることだと思います。", tag:"bad", role:"distrust"},
    {text:"自業自得だったんじゃないですか。", tag:"trap", role:"trap"},
    {text:"誰も覚えていないと思います。", tag:"trap", role:"trap"},
    {text:"意味を探しても無駄です。", tag:"trap", role:"trap"}
  ];

  var state = {phase:"title", i:0, score:0, fails:0, resumeTime:20, answerTime:30, current:null, hp:0, trust:0, maxHp:0, maxTrust:0, timer:null, paused:false, compat:{}, used:{}, recent:[]};
  function show(name){ Object.keys(screens).forEach(function(k){ screens[k].classList.toggle("on", k === name); }); }
  function toast(msg){ els.toast.textContent=msg; els.toast.classList.remove("hidden"); clearTimeout(toast.t); toast.t=setTimeout(function(){els.toast.classList.add("hidden");},1000); }
  function updateHeader(){
    els.score.textContent=state.score+"/"+state.fails;
    if(state.phase==="resume"){ els.timerLabel.textContent="履歴書"; els.timer.textContent=state.resumeTime.toFixed(1); }
    else if(state.phase==="game"){ els.timerLabel.textContent="回答"; els.timer.textContent=state.answerTime.toFixed(1); }
    else { els.timerLabel.textContent="待機"; els.timer.textContent="--"; }
  }
  function buildBig5(n, type){
    var seed=hash(type+"-"+n); var r=rng(seed);
    return {E:Math.round(r()*100), A:Math.round(r()*100), C:Math.round(r()*100), N:Math.round(r()*100), O:Math.round(r()*100)};
  }
  function pickName(gender, n){
    var names = gender === "女性" ? femaleNames : (gender === "男性" ? maleNames : neutralNames);
    return names[(n*7)%names.length];
  }
  function makeGhost(n){
    var regret = regrets[n % regrets.length];
    var genderRoll = n % 20;
    var gender = genderRoll < 9 ? "女性" : (genderRoll < 18 ? "男性" : "不明");
    var type = typeTags[n % typeTags.length];
    var name = pickName(gender, n);
    var age = 16 + ((n * 13) % 73);
    var want = regret.want;
    var memo = regret.witness;

    var b = buildBig5(n, type);
    if(n % 3 === 0){ want = typeWants[type] || want; }
    if(b.N > 68){ memo += " 軽い励ましには傷つきやすい。"; }
    else if(b.A > 70){ memo += " 相手の反応を先に気にする。"; }
    else if(b.O > 70){ memo += " 話が少し飛びやすい。"; }
    else if(b.C > 70){ memo += " 役目や責任をまだ数えている。"; }
    else { memo += " 本音を出すまで少し時間がかかる。"; }
    if(age < 20){ memo += " 言葉より表情が先に出る。"; }
    else if(age < 35){ memo += " 選ばなかった道を気にしている。"; }
    else if(age < 55){ memo += " 責任や役目の話に反応しやすい。"; }
    else { memo += " 急かされると黙り込む。"; }

    var avoid = want==="logic" ? "根拠のない励まし" : want==="listen" ? "急な結論" : want==="anger" ? "きれいごと" : want==="chat" ? "説教" : "軽く扱う言葉";
    memo = memo + " 避けたい話し方：" + avoid + "。";

    return {name:name, gender:gender, age:age, cause:causes[(n*5)%causes.length], regret:regret.name, item:regret.item, memo:memo, face:faces[(n*11)%faces.length], maxHp:3+(n%3), maxTrust:4+(n%2), speech:regret.speech, want:want, type:type, seed:hash(name+type+n)};
  }
  function buildGhosts(){ var arr=[]; for(var i=0;i<CONFIG.ghostCount;i++){ arr.push(makeGhost(i)); } return arr; }
  var ghosts = buildGhosts();
  function start(){ state.i=0; state.score=0; state.fails=0; state.compat={}; state.paused=false; if(state.timer) clearInterval(state.timer); state.timer=setInterval(tick,100); loadGhost(); }
  function loadGhost(){
    if(state.fails>=3){ end("ゲームオーバー","3回成仏に失敗しました。"); return; }
    state.current=ghosts[state.i%ghosts.length]; state.resumeTime=20; state.answerTime=30; state.maxHp=state.current.maxHp; state.maxTrust=state.current.maxTrust; state.hp=state.maxHp; state.trust=state.maxTrust; state.phase="resume"; state.used={}; state.recent=[];
    renderResume(); show("resume"); updateHeader();
  }
  function renderResume(){
    var g=state.current; els.rName.textContent=g.name; els.rGender.textContent=g.gender; els.rAge.textContent=g.age+"歳"; els.rCause.textContent=g.cause; els.rRegret.textContent=g.regret; els.rItem.textContent=g.item; els.rMemo.textContent=g.memo;

    els.itemLabel.textContent = "遺品";
    els.memoLabel.textContent = "入室前メモ";

  }
  function begin(){
    if(state.phase!=="resume") return;
    state.phase="game"; state.answerTime=30; els.face.textContent=state.current.face; els.speech.textContent=state.current.speech;

    var opener = modeReplies[state.current.want] ? modeReplies[state.current.want].q : state.current.speech;
    els.speech.textContent = state.current.speech + " " + opener;

    els.log.classList.remove("hidden"); els.log.innerHTML='<span class="badge">おばけ</span>'+els.speech.textContent;

    show("game"); renderGame(); updateHeader();
  }
  function fit(c){ return c.tag===state.current.want ? 2 : (c.role==="watch" ? 0 : (c.tag==="bad" ? -1 : 1)); }
  function renderGame(){
    els.hp.textContent="成仏HP "+state.hp+"/"+state.maxHp+" / 不信HP "+state.trust+"/"+state.maxTrust;
    els.round.textContent="失敗 "+state.fails+"/3"; els.choices.innerHTML="";
    var seed = state.current.seed + state.hp*17 + state.trust*31 + state.i*7;
    var pool = choiceBank.slice();

    pool = pool.filter(function(c){ return !state.used[c.text]; });
    if(pool.length < 4){ state.used = {}; pool = choiceBank.slice(); }
    pool = pool.sort(function(a,b){
      var ap = state.recent.indexOf(a.tag)>=0 ? 2 : 0;
      var bp = state.recent.indexOf(b.tag)>=0 ? 2 : 0;
      return (bp-ap) || (Math.random()-.5);
    });

    var choices = pool.slice(0,4);
    var correct=null; for(var i=0;i<choiceBank.length;i++){ if(choiceBank[i].tag===state.current.want){ correct=choiceBank[i]; break; } }
    if(correct){ choices[0]=correct; }
    choices=shuffle(choices, seed);
    choices.forEach(function(c,idx){
      var b=document.createElement("button"); b.className="choice";

      b.innerHTML='<span class="choiceNum">'+(idx+1)+'</span><span class="choiceText">'+safe(c.text)+'</span>';

      b.onclick=function(){choose(c);}; els.choices.appendChild(b);
    });
  }
  function choose(c){
    if(state.phase!=="game") return; state.answerTime=30; state.used[c.text]=true; state.recent.push(c.tag); if(state.recent.length>2) state.recent.shift();
    if(c.role==="trap"){ fail("その言葉で、おばけは黙って面談室を出ていきました。"); return; }
    var reply="";
    if(c.tag===state.current.want){ state.hp-=2; reply = modeReplies[state.current.want] ? modeReplies[state.current.want].react : "……今の言葉、少し届きました。"; els.speech.textContent=reply; toast("成仏HPが大きく減った"); }
    else if(c.role==="watch"){ reply = modeReplies[state.current.want] ? modeReplies[state.current.want].q : "もう少しだけ、続けてもいいですか。"; els.speech.textContent=reply; toast("様子見。HP変化なし"); }
    else if(c.role==="distrust"){ state.trust-=1; reply="……すみません。今の言い方だと、少し遠く感じます。"; els.speech.textContent=reply; toast("不信HPが減った"); }
    else { state.hp-=1; reply="そういう見方も、あるんですね。少し続けてもいいですか。"; els.speech.textContent=reply; toast("少し届いた"); }

    els.log.innerHTML='<span class="badge">あなた</span>'+c.text+'<br><span class="badge">おばけ</span>'+reply;

    if(state.hp<=0){ ascend(); return; }
    if(state.trust<=0){ fail("おばけはこれ以上話してくれなくなりました。"); return; }
    renderGame(); updateHeader();
  }
  function ascend(){ var g=state.current; state.score++; state.i++; if(g.type){ state.compat[g.type]=(state.compat[g.type]||0)+1; } els.speech.textContent = modeReplies[g.want] ? modeReplies[g.want].finish : "……ありがとうございます。やっと行けそうです。"; els.choices.innerHTML=""; toast("成仏しました"); state.phase="transition"; setTimeout(loadGhost,900); }
  function fail(reason){ state.fails++; state.i++; els.speech.textContent=reason; els.choices.innerHTML=""; toast("成仏失敗 "+state.fails+"/3"); state.phase="transition"; setTimeout(loadGhost,1000); }
  function end(title,text){
    state.phase="result";
    if(state.timer) clearInterval(state.timer);
    els.resultTitle.textContent=title;
    els.resultText.textContent=text;
    els.finalScore.textContent=state.score;

    var best="", bestN=0;
    Object.keys(state.compat).forEach(function(k){
      if(state.compat[k]>bestN){ best=k; bestN=state.compat[k]; }
    });

    var rank = state.score >= 20 ? "霊界面談主任クラス" :
      state.score >= 12 ? "かなり聞ける面談官" :
      state.score >= 6 ? "相手を選べば強い面談官" :
      state.score >= 2 ? "まだ探り探りの面談官" :
      "これからの新人面談官";

    var tendencyMap = {
      ISTJ:"責任や事実を整理する相手に強いです。感情で包むより、順番を作る返答が刺さっています。",
      ISFJ:"尽くしてきた気持ちを拾う相手に強いです。努力を見逃さない返答が向いています。",
      INFJ:"言葉にしづらい痛みを待てるタイプです。意味づけや静かな共感が得意寄りです。",
      INTJ:"納得できる筋道を作る相手に強いです。原因と結論を分ける返答が合っています。",
      ISTP:"短く核心を突く相手に強いです。大げさにせず、事実で支えるのが向いています。",
      ISFP:"小さな記憶や好きだったものを守る相手に強いです。正論より余白が武器です。",
      INFP:"本音を急かさず待つ相手に強いです。決めつけず、言葉になる前の気持ちを拾えています。",
      INTP:"矛盾や疑問をほどく相手に強いです。考えることを止めない返答が刺さっています。",
      ESTP:"怒りや勢いを否定しない相手に強いです。きれいごとにしない返答が合っています。",
      ESFP:"雑談や思い出からほどける相手に強いです。空気を明るくする返答が向いています。",
      ENFP:"叶わなかった未来を肯定する相手に強いです。希望を閉じない返答が刺さっています。",
      ENTP:"ひねくれた本音や反骨を受け止める相手に強いです。普通に丸めない返答が合っています。",
      ESTJ:"区切りや成果をはっきり扱う相手に強いです。曖昧に慰めない返答が向いています。",
      ESFJ:"関係や感謝を確認したい相手に強いです。つながりを言葉にする返答が刺さっています。",
      ENFJ:"誰かへの影響を気にする相手に強いです。存在の届き方を伝える返答が合っています。",
      ENTJ:"途中で止まった意志を次へ渡す相手に強いです。継承や結論の返答が向いています。"
    };

    var tendency = best ? (tendencyMap[best] || (best + "風の相手と相性が良さそうです。")) : "まだ傾向は薄めです。";
    var failComment = state.fails === 0 ? "失敗なし。かなり安定しています。" :
      state.fails === 1 ? "1回だけ失敗。攻めた返答も混ざっています。" :
      state.fails === 2 ? "失敗2回。地雷を踏む直前まで粘る場面が多めです。" :
      "3回失敗。相手の避けたい言葉を見抜く余地があります。";

    els.compat.innerHTML =
      "<strong>" + rank + "</strong><br>" +
      "一番相性がよかった傾向：" + (best ? best + "風（" + bestN + "体）" : "判定なし") + "<br>" +
      tendency + "<br>" +
      failComment;

    show("result");
    updateHeader();
  }
  function tick(){ if(state.paused) return; if(state.phase==="resume"){ state.resumeTime=Math.max(0,state.resumeTime-.1); if(state.resumeTime<=0) begin(); } else if(state.phase==="game"){ state.answerTime=Math.max(0,state.answerTime-.1); if(state.answerTime<=0) fail("返事を待ったまま、おばけは面談室を出ていきました。"); } updateHeader(); }
  els.startBtn.onclick=start; els.skipBtn.onclick=begin; els.restartBtn.onclick=start;

  els.pauseBtn.onclick=function(){ if(state.phase==="title" || state.phase==="result") return; state.paused=true; els.pauseOverlay.classList.remove("hidden"); };
  els.resumeBtn.onclick=function(){ state.paused=false; els.pauseOverlay.classList.add("hidden"); };

  els.debug.textContent="JS起動済み。v23";
  updateHeader();
})();

</script>
