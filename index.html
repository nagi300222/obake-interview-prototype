<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>おばけ面談室 v25</title>
<style>
*{box-sizing:border-box}
html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic","Noto Sans JP",system-ui,sans-serif;background:#090b14;color:#fff}
#app{width:min(100vw,470px);height:100dvh;margin:0 auto;background:linear-gradient(#20263b,#0b0d16);overflow:hidden;position:relative}
.header{height:88px;padding:18px 12px 10px;display:grid;grid-template-columns:1fr 1fr 56px;gap:8px;background:#121624;border-bottom:1px solid rgba(255,255,255,.14)}
.card{border:1px solid rgba(255,255,255,.16);border-radius:18px;background:rgba(255,255,255,.06);padding:8px 12px}
.label{font-size:12px;color:#aeb6d1;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.value{font-size:28px;font-weight:1000;line-height:1}
button{font:inherit}
.pause{border:0;border-radius:18px;background:#b3f7dc;color:#111827;font-size:24px;font-weight:1000}
.screen{display:none;height:calc(100dvh - 88px);padding:16px}
.screen.on{display:block}
.titleBox,.paper,.resultBox{height:100%;border:1px solid rgba(255,255,255,.14);border-radius:26px;background:rgba(255,255,255,.08);padding:22px;display:flex;flex-direction:column;justify-content:center;text-align:center}
h1{font-size:44px;line-height:1.05;margin:0 0 16px}
.mainBtn{border:0;border-radius:18px;background:#b3f7dc;color:#111827;font-weight:1000;padding:16px;margin-top:18px;font-size:18px}
.sub{color:#cfd6ea;line-height:1.7;font-weight:800}
.debug{margin-top:14px;color:#b3f7dc;font-size:13px;font-weight:900;line-height:1.5}
.paper{background:#f4ecdc;color:#202231;text-align:left;justify-content:flex-start}
.paper h2{font-size:30px;margin:12px 0}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;overflow:auto;padding-bottom:8px}
.field{border:1px solid rgba(32,34,49,.16);border-radius:14px;background:rgba(255,255,255,.48);padding:10px;min-height:66px}
.field.wide{grid-column:1/-1}
dt{font-size:12px;color:#6d5d63;font-weight:900}
dd{margin:4px 0 0;font-weight:900;line-height:1.45}
.footer{margin-top:auto;display:flex;align-items:center;justify-content:space-between;gap:10px}
.footer span{font-weight:900;color:#6d5d63}
#game.screen.on{display:flex;flex-direction:column;min-height:0;padding:0 12px calc(12px + env(safe-area-inset-bottom))}
.room{flex:0 0 42%;min-height:245px;position:relative;background:linear-gradient(#252b43 0 60%,#171a24 60%);border-bottom:1px solid rgba(255,255,255,.14);overflow:hidden;border-radius:0 0 18px 18px}
.ghost{position:absolute;left:50%;top:8px;transform:translateX(-50%);width:126px;height:166px;border-radius:65px 65px 28px 28px;background:linear-gradient(#f1fbff,rgba(241,251,255,.75));box-shadow:0 0 52px rgba(179,247,220,.34)}
.face{position:absolute;top:48px;left:0;right:0;text-align:center;color:#20263b;font-size:28px;font-weight:1000}
.speech{position:absolute;left:12px;right:12px;bottom:10px;border-radius:20px;background:rgba(246,248,252,.95);color:#151827;padding:12px 14px;font-weight:900;line-height:1.55;min-height:106px;max-height:132px;overflow:auto;z-index:2}
.log{position:absolute;left:12px;right:12px;bottom:122px;max-height:72px;overflow:auto;border-radius:14px;background:rgba(0,0,0,.25);padding:8px 10px;font-size:12px;color:#d8e0f2;line-height:1.45}
.badge{display:inline-block;margin-right:6px;color:#b3f7dc;font-weight:1000}
.statusRow{display:flex;gap:8px;margin:8px 0;flex:0 0 auto}
.choices{flex:1 1 auto;min-height:0;display:grid;gap:9px;overflow-y:auto;padding:0 0 12px;align-content:start}
.choice{border:1px solid rgba(255,255,255,.14);border-radius:18px;background:rgba(255,255,255,.08);color:#fff;text-align:left;padding:10px 12px;font-weight:900;font-size:15px;line-height:1.35;min-height:58px;display:flex;align-items:center;gap:8px;overflow:hidden}
.choice:active,.mainBtn:active{transform:translateY(1px)}
.choiceNum{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:8px;background:rgba(179,247,220,.18);color:#b3f7dc;flex:0 0 auto}
.choiceText{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.hidden{display:none!important}
.toast{position:absolute;left:14px;right:14px;bottom:18px;background:rgba(5,6,10,.92);border:1px solid rgba(255,255,255,.14);border-radius:16px;padding:12px 14px;font-weight:900;z-index:9;line-height:1.5}
.overlay{position:absolute;inset:0;background:rgba(5,6,10,.72);display:grid;place-items:center;z-index:20;padding:24px}
.overlayCard{background:#f6f8ff;color:#151827;border-radius:24px;padding:22px;text-align:center;width:100%}
.resultBox{justify-content:flex-start;text-align:left;overflow:auto}
.resultBox h1{text-align:center;font-size:36px}
.analysis{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.13);border-radius:18px;padding:14px;margin:10px 0;color:#e7edff;line-height:1.65;font-weight:800}
.analysis strong{color:#b3f7dc}
.analysis small{display:block;color:#cfd6ea;margin-top:6px;line-height:1.55}
@media(max-height:760px){
  .room{flex-basis:39%;min-height:220px}
  .ghost{top:0;transform:translateX(-50%) scale(.82);transform-origin:top center}
  .speech{min-height:84px;max-height:104px;font-size:14px}
  .log{display:none}
  .choice{min-height:52px;font-size:14px;padding:10px 12px}
}
@media(max-height:660px){
  .room{flex-basis:35%;min-height:190px}
  .speech{min-height:78px;max-height:94px}
}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="card"><div class="label">成仏/失敗</div><div class="value" id="score">0/0</div></div>
    <div class="card"><div class="label" id="timerLabel">待機</div><div class="value"><span id="timer">--</span><small>秒</small></div></div>
    <button class="pause" id="pauseBtn">Ⅱ</button>
  </div>

  <section id="title" class="screen on">
    <div class="titleBox">
      <h1>おばけ<br>面談室</h1>
      <p class="sub">v25：具体相談＋性格差＋HP段階非表示＋ズレ反応強化版。<br>会話の中身とズレ反応から、おばけに合う聞き方を読む。</p>
      <button id="startBtn" class="mainBtn">面談を始める</button>
      <p id="debug" class="debug">JS確認中...</p>
      <p class="sub" style="font-size:12px;margin-top:10px">具体相談 / 良いけど違う反応 / 圧耐性 / 連打減衰 / HP段階非表示</p>
    </div>
  </section>

  <section id="resume" class="screen">
    <article class="paper">
      <div style="display:inline-block;border:2px solid #bd4d4d;color:#bd4d4d;border-radius:8px;padding:6px 10px;font-weight:1000;transform:rotate(-2deg)">霊界面談 履歴書</div>
      <h2 id="rName">---</h2>
      <dl class="grid">
        <div class="field"><dt>性別</dt><dd id="rGender">---</dd></div>
        <div class="field"><dt>享年</dt><dd id="rAge">---</dd></div>
        <div class="field"><dt>死因</dt><dd id="rCause">---</dd></div>
        <div class="field"><dt>未練</dt><dd id="rRegret">---</dd></div>
        <div class="field wide"><dt>遺品</dt><dd id="rItem">---</dd></div>
        <div class="field wide"><dt>入室前メモ</dt><dd id="rMemo">---</dd></div>
      </dl>
      <div class="footer"><span>20秒後に入室します</span><button id="skipBtn" class="mainBtn" style="margin-top:0">すぐ面談</button></div>
    </article>
  </section>

  <section id="game" class="screen">
    <div class="room">
      <div class="ghost"><div class="face" id="face">；_；</div></div>
      <div id="log" class="log hidden"></div>
      <div class="speech" id="speech">---</div>
    </div>
    <div class="statusRow">
      <div class="card" style="flex:1"><div class="label" id="hp">成仏HP -- / 不信HP --</div></div>
      <div class="card"><div class="label" id="round">--/150</div></div>
    </div>
    <div class="choices" id="choices"></div>
  </section>

  <section id="result" class="screen">
    <div class="resultBox">
      <h1 id="resultTitle">終了</h1>
      <p class="sub" id="resultText">---</p>
      <div style="text-align:center"><div class="value" id="finalScore">0</div><div class="label">成仏数</div></div>
      <div id="compat" class="analysis"></div>
      <button id="restartBtn" class="mainBtn">もう一度</button>
    </div>
  </section>

  <div id="pauseOverlay" class="overlay hidden">
    <div class="overlayCard">
      <h2>一時停止中</h2>
      <p>面談室の時計を止めています。</p>
      <button id="resumeBtn" class="mainBtn">再開</button>
    </div>
  </div>
  <div id="toast" class="toast hidden"></div>
</div>

 var reply="",damage=0,distrust=0,s=scoreChoice(c),directHit=c.tag===state.current.want||s>=5,goodButDifferent=c.role==="pull"&&!directHit&&s>=0,tooMuch=(c.pressure||0)>state.current.pressureTolerance,repeated=repeatedResponse(c.responseType);
 if(repeated>=2){distrust=1;reply="さっきも、似たこと言ってました。たぶん、そこじゃないんだと思います。";state.softMismatch++;toast("同じ聞き方が続いている")}
 else if(tooMuch){distrust=1;reply="そこまで聞かれると、ちょっと怖いです。まだ、自分でも言葉にできてないので。";state.softMismatch++;toast("少し圧が強い")}
 else if(directHit){damage=state.stage==="core"?3:2;reply=modeReplies[state.current.want].react;if(state.stage==="core")reply+=" それ、たぶん一番聞きたかったです。";toast("核心に届いた")}
 else if(goodButDifferent){damage=1;reply=goodButDifferentReply();state.softMismatch++;toast("良いけど少し違う")}
 else if(c.role==="watch"){damage=state.stage==="surface"?0:1;reply=nextGhostQuestion(c);toast(damage?"少し届いた":"様子見")}
 else if(c.role==="distrust"||s<0){distrust=1;if(c.responseType==="advice")distrust++;reply=smallReject(c);toast("不信HPが減った")}
 else{damage=1;reply="そういう見方も、あるんですね。少し続けてもいいですか。";toast("少し届いた")}
 state.responseHistory.push(c.responseType);if(state.responseHistory.length>6)state.responseHistory.shift();
 state.hp=clamp(state.hp-damage,0,state.maxHp);state.trust=clamp(state.trust-distrust,0,state.maxTrust);stageProgress();revealNextLine(reply);
 els.log.innerHTML='<span class="badge">あなた</span>'+safe(c.text)+'<br><span class="badge">おばけ</span>'+safe(els.speech.textContent);
 if(state.hp<=0){ascend();return}
 if(state.trust<=0){fail(failHint(c,"distrust"));return}
 renderGame();updateHeader();
}
function failHint(c,kind){
 var g=state.current,base=modeReplies[g.want].fail;
 if(c&&c.responseType==="advice")base="どうしたらいいか、じゃなかったんです。もう終わってるから。 "+base;
 else if(c&&c.responseType==="clarify")base="まだ整理できてないんです。先に分けられると、置いていかれます。 "+base;
 else if(c&&c.responseType==="support"&&c.tag==="bad")base="前向きって言われると、今の私がダメみたいで。 "+base;
 if(kind==="trap")base="それを言われると、もう話せないです。 "+base;
 base+=" 本当は、"+g.hiddenNeed+"だけでした。";state.failReasons.push(base);return base;
}
function ascend(){
 var g=state.current;state.score++;state.i++;state.compat[g.type]=(state.compat[g.type]||0)+1;
 var reply=modeReplies[g.want].finish+" "+g.caseDetail.object+"のことも、もう置いていけそうです。";
 if(g.speechProfile.talkAmount==="short")reply="……はい。"+reply;
 els.speech.textContent=reply;els.choices.innerHTML="";toast("成仏しました");state.phase="transition";setTimeout(loadGhost,950);
}
function fail(reason){state.fails++;state.i++;els.speech.textContent=reason;els.log.innerHTML='<span class="badge">おばけ</span>'+safe(reason);els.choices.innerHTML="";toast("成仏失敗 "+state.fails+"/3");state.phase="transition";setTimeout(loadGhost,1300)}
function topResponse(){var best="",bestN=0;Object.keys(state.responseCounts).forEach(function(k){if(state.responseCounts[k]>bestN){best=k;bestN=state.responseCounts[k]}});return{key:best,count:bestN,label:best?responseInfo[best].label:"判定なし",text:best?responseInfo[best].result:"まだ応答傾向は薄めです。"}}
function end(title,text){
 state.phase="result";if(state.timer)clearInterval(state.timer);els.resultTitle.textContent=title;els.resultText.textContent=text;els.finalScore.textContent=state.score;
 var best="",bestN=0;Object.keys(state.compat).forEach(function(k){if(state.compat[k]>bestN){best=k;bestN=state.compat[k]}});
 var rank=state.score>=20?"霊界面談主任クラス":state.score>=12?"かなり聞ける面談官":state.score>=6?"相手を選べば強い面談官":state.score>=2?"まだ探り探りの面談官":"これからの新人面談官";
 var resp=topResponse(),failLast=state.failReasons.length?state.failReasons[state.failReasons.length-1]:"大きな失敗ヒントはまだありません。";
 els.compat.innerHTML="<strong>"+safe(rank)+"</strong><br>相性がよかった性格傾向："+safe(best?best+"風（"+bestN+"体）":"判定なし")+"<br>よく使った応答："+safe(resp.label)+"<br>"+safe(resp.text)+"<br>ズレを起こした回数："+state.softMismatch+"回<br>"+(state.score>=10?"<small>10人成仏以降はHPを隠しています。数字より、おばけの返事・沈黙・話題の変化を読んでください。</small>":"")+"<br><strong>最後に残ったヒント</strong><br>"+safe(failLast);
 show("result");updateHeader();
}
function tick(){
 if(state.paused)return;
 if(state.phase==="resume"){state.resumeTime=Math.max(0,state.resumeTime-.1);if(state.resumeTime<=0)begin()}
 else if(state.phase==="game"){state.answerTime=Math.max(0,state.answerTime-.1);if(state.answerTime<=0)fail("返事を待ってる時間が、少し長すぎました。……何か言ってほしかったです。")}
 updateHeader();
}

els.startBtn.onclick=start;els.skipBtn.onclick=begin;els.restartBtn.onclick=start;
els.pauseBtn.onclick=function(){if(state.phase==="title"||state.phase==="result")return;state.paused=true;els.pauseOverlay.classList.remove("hidden")};
els.resumeBtn.onclick=function(){state.paused=false;els.pauseOverlay.classList.add("hidden")};
els.debug.textContent="JS起動済み。v25";updateHeader();
})();
</script>
