var typeProfiles={ISTJ:{want:"logic",style:"formal",prefer:["整理","責任","事実"],trap:["軽視","気にしすぎ"],sample:"順番に話します。まず、そこからでいいですか。"},ISFJ:{want:"care",style:"soft",prefer:["承認","関係","受容"],trap:["軽視","助言"],sample:"私のことより、あの人たちが困ってないかが気になります。"},INFJ:{want:"listen",style:"quiet",prefer:["意味","共感","沈黙"],trap:["考えすぎ","結論急ぎ"],sample:"うまく言えないんですけど、まだ残ってる感じがします。"},INTJ:{want:"logic",style:"dry",prefer:["分析","結論","事実"],trap:["感情押し","曖昧"],sample:"感情の問題にされると困ります。原因を見たいです。"},ISTP:{want:"listen",style:"short",prefer:["簡潔","事実","余白"],trap:["詮索","大げさ"],sample:"長く話すのは得意じゃないです。それだけです。"},ISFP:{want:"memory",style:"sensory",prefer:["記憶","肯定","余白"],trap:["正論","評価"],sample:"変なところだけ覚えてます。匂いとか、色とか。"},INFP:{want:"listen",style:"roundabout",prefer:["本心","共感","余白"],trap:["批判","比較"],sample:"言えばよかった、とは思います。でも言ったら壊れる気がして。"},INTP:{want:"logic",style:"question",prefer:["分析","可能性","問い"],trap:["感情で押す","雑励まし"],sample:"矛盾してるのは分かってます。でも、そこが引っかかってます。"},ESTP:{want:"anger",style:"rough",prefer:["怒り","現実","叱責"],trap:["落ち着け","説教"],sample:"いや、泣きに来たわけじゃないっす。ただムカついてるだけで。"},ESFP:{want:"chat",style:"bright",prefer:["雑談","記憶","軽さ"],trap:["しんみり","説教"],sample:"変な話していいですか？最後に思い出したの、ほんまにどうでもいい日なんです。"},ENFP:{want:"hope",style:"jump",prefer:["希望","可能性","意味"],trap:["現実だけ","否定"],sample:"まだ、何か続きがあった気がするんです。変ですかね。"},ENTP:{want:"chat",style:"irony",prefer:["軽さ","挑戦","問い"],trap:["普通に丸める","説教"],sample:"まあ、面談って時点でだいぶ変ですけど。話します？"},ESTJ:{want:"closure",style:"direct",prefer:["区切り","評価","責任"],trap:["曖昧","先延ばし"],sample:"結論から言います。終わらせ方が分かりません。"},ESFJ:{want:"care",style:"relational",prefer:["関係","感謝","承認"],trap:["孤独扱い","無関係"],sample:"ちゃんと届いてたんでしょうか。そこだけ、ずっと気になってます。"},ENFJ:{want:"inherit",style:"warm",prefer:["影響","継承","共感"],trap:["小さく扱う","無意味"],sample:"誰かの役に立てたなら、少しは救われる気がします。"},ENTJ:{want:"inherit",style:"firm",prefer:["継承","結論","評価"],trap:["弱さだけ","停滞"],sample:"途中で止まったものを、どう扱えばいいのか知りたいです。"}};
var regrets=[{name:"家族",item:"折りたたまれた買い物メモ",witness:"家族の話になると玄関の方を見る。",speech:"家に帰る途中だったんです。買い物袋の中身だけ、妙にはっきり覚えています。",baseWant:"care"},{name:"仕事",item:"角の折れた作業ノート",witness:"時間の話になると背筋が伸びる。",speech:"机の上だけ片づけて帰りました。あれで本当に終われたのか、まだ考えています。",baseWant:"logic"},{name:"夢",item:"擦り切れたチケット半券",witness:"未来の話になると少し早口になる。",speech:"向いてなかったのか、続ける根性がなかったのか、まだ分かりません。",baseWant:"hope"},{name:"孤独",item:"未開封の飴玉",witness:"人の気配にはすぐ反応する。",speech:"誰も来ないのは慣れていたはずなのに、最後の日だけ寂しかった。",baseWant:"listen"},{name:"怒り",item:"破れた領収書",witness:"穏やかに話すほど指先が震える。",speech:"許したことになっているのが、いちばん腹立たしいんです。",baseWant:"anger"},{name:"思い出",item:"小さな缶バッジ",witness:"好きなものの話だけ少し目が明るい。",speech:"くだらないものばかり集めていたと言われました。でも、私には大事でした。",baseWant:"memory"},{name:"約束",item:"止まった腕時計",witness:"時間を聞かれると顔を伏せる。",speech:"約束の場所には行けませんでした。相手が待っていたかも分かりません。",baseWant:"closure"},{name:"罪悪感",item:"折れた鍵",witness:"自分を責める言葉だけすらすら出る。",speech:"謝る相手を間違えた気がします。誰に謝ればいいのかも分からない。",baseWant:"scold"},{name:"継承",item:"書きかけのノート",witness:"途中という言葉に強く反応する。",speech:"途中で止まったものを、置いていくのが怖いんです。",baseWant:"inherit"},{name:"雑談",item:"古い喫茶店のレシート",witness:"本題を避けるように小さな話をする。",speech:"本題の前に、少しだけ関係ない話をしてもいいですか。",baseWant:"chat"}];
var modeReplies={chat:{finish:"最後に普通の話ができて、やっと帰れます。",react:"面談って、もっと怖いものかと思ってました。",q:"面談なのに、笑っても怒られませんか。",fail:"最後まで面談っぽくしなくてよかったんです。普通に、どうでもいい話をしたかっただけで。"},scold:{finish:"ちゃんと見てくれて、やっと自分のしたことを認められました。",react:"今の、少し痛いです。でも逃げなくて済みます。",q:"怒られたら楽になるなんて、変ですか。",fail:"優しくされたいだけじゃなかったです。ダメだったところを、ちゃんと見てほしかった。"},listen:{finish:"急かされなかったから、置いていけます。",react:"黙って待ってくれるの、助かります。",q:"沈黙しても、ここにいていいですか。",fail:"正しい言葉がほしいわけじゃないです。言えなかった気持ちを、急かさず置かせてほしかった。"},logic:{finish:"筋道が見えたら、やっと足が動きます。",react:"もう少し分けて考えたら、見えそうです。",q:"原因を一つずつ見るなら、どこからですか。",fail:"励ましてほしかったわけじゃないんです。何が起きたのか、ちゃんと分けて見たかった。"},closure:{finish:"ここで終わりにします。今度こそ自分で閉じられます。",react:"終わらせるって、冷たいことじゃないんですね。",q:"終わらせるって、逃げることとは違いますか。",fail:"続け方じゃなくて、終わらせ方を聞きたかったんです。もう閉じていいって、言ってほしかった。"},care:{finish:"見てくれる人がいたなら、もう十分です。",react:"そんなふうに見てもらえるとは思いませんでした。",q:"私のしてきたこと、無駄じゃなかったんでしょうか。",fail:"頑張れじゃなくて、頑張ってたねって言ってほしかったです。それだけで、たぶんよかった。"},memory:{finish:"その小さな記憶ごと、持って行っていいんですね。",react:"そうです。そういう小さいことが、ずっと残っていて。",q:"こんな小さい思い出で泣くの、変ですか。",fail:"しんみり正解にしないでほしかったな。普通に笑って、それ好きやったんやなって言ってほしかった。"},hope:{finish:"叶わなかった未来にも、意味があったんですね。",react:"少しだけ、先の話をしてもいいんですね。",q:"まだ未来の話をしてもいいんでしょうか。",fail:"無理だったって決めてほしいわけじゃないです。閉じなかった未来を、少しだけ見てほしかった。"},inherit:{finish:"続きは誰かに渡していいんですね。肩の力が抜けました。",react:"誰かに渡すって、投げ出すこととは違うんですか。",q:"途中で渡すのは、投げ出すことですか。",fail:"全部やりきれって言われると、苦しいです。途中でも、誰かに渡していいって言ってほしかった。"},anger:{finish:"怒っていいと言われて、やっと力が抜けました。",react:"きれいにしなくていいんですね。",q:"許したことにしなくても、いいんですか。",fail:"落ち着けって言われたいわけじゃないっす。怒っていいって、誰かに言ってほしかっただけです。"}};

var choicesBase=[{text:"その話、最後まで聞きます。",tag:"listen",role:"pull",responseType:"accept",tone:"soft"},{text:"それ、悔しかったですよね。",tag:"listen",role:"pull",responseType:"reflect",tone:"soft"},{text:"そこまでしたことは、ちゃんと残っています。",tag:"care",role:"pull",responseType:"support",tone:"warm"},{text:"何が引っかかっているか、分けましょう。",tag:"logic",role:"pull",responseType:"clarify",tone:"calm"},{text:"原因を一つずつ見てもいいですか。",tag:"logic",role:"pull",responseType:"clarify",tone:"calm"},{text:"ここで区切っても大丈夫です。",tag:"closure",role:"pull",responseType:"support",tone:"firm"},{text:"小さい思い出ほど、残っていいんです。",tag:"memory",role:"pull",responseType:"reflect",tone:"soft"},{text:"その続きは、誰かに渡してもいいんです。",tag:"inherit",role:"pull",responseType:"support",tone:"firm"},{text:"叶わなかった時間も、失敗だけじゃないです。",tag:"hope",role:"pull",responseType:"support",tone:"warm"},{text:"少しだけ、関係ない話をしましょうか。",tag:"chat",role:"pull",responseType:"joke",tone:"light"},{text:"怒っていい話です。きれいにしなくていい。",tag:"anger",role:"pull",responseType:"accept",tone:"direct"},{text:"逃げたことまで、なかったことにしなくていいです。",tag:"scold",role:"pull",responseType:"scold",tone:"firm"},{text:"続きから聞かせてください。",tag:"watch",role:"watch",responseType:"accept",tone:"soft"},{text:"少し黙って待ちます。急がなくていいです。",tag:"watch",role:"watch",responseType:"silence",tone:"quiet"},{text:"誰に一番聞いてほしかったですか。",tag:"question",role:"watch",responseType:"question",tone:"calm"},{text:"まず何をすればよかったんですかね。",tag:"bad",role:"distrust",responseType:"advice",tone:"practical"},{text:"前向きに考えた方がいいです。",tag:"bad",role:"distrust",responseType:"advice",tone:"light"},{text:"時間が解決してくれると思います。",tag:"bad",role:"distrust",responseType:"advice",tone:"light"},{text:"誰にでもあることだと思います。",tag:"bad",role:"distrust",responseType:"support",tone:"shallow"},{text:"もう終わったことですよね。",tag:"bad",role:"distrust",responseType:"clarify",tone:"cold"},{text:"自業自得だったんじゃないですか。",tag:"trap",role:"trap",responseType:"scold",tone:"cold"},{text:"誰も覚えていないと思います。",tag:"trap",role:"trap",responseType:"advice",tone:"cold"},{text:"意味を探しても無駄です。",tag:"trap",role:"trap",responseType:"clarify",tone:"cold"}];
var state={phase:"title",i:0,score:0,fails:0,resumeTime:20,answerTime:30,current:null,hp:0,trust:0,maxHp:0,maxTrust:0,timer:null,paused:false,compat:{},used:{},recent:[],stage:"surface",turns:0,responseCounts:{},failReasons:[]};
function show(name){Object.keys(screens).forEach(function(k){screens[k].classList.toggle("on",k===name)})}function toast(msg){els.toast.textContent=msg;els.toast.classList.remove("hidden");clearTimeout(toast.t);toast.t=setTimeout(function(){els.toast.classList.add("hidden")},1100)}function updateHeader(){els.score.textContent=state.score+"/"+state.fails;if(state.phase==="resume"){els.timerLabel.textContent="履歴書";els.timer.textContent=state.resumeTime.toFixed(1)}else if(state.phase==="game"){els.timerLabel.textContent="回答";els.timer.textContent=state.answerTime.toFixed(1)}else{els.timerLabel.textContent="待機";els.timer.textContent="--"}}
function buildBig5(n,type,gender,age){var r=rng(hash(type+"-"+n+"-"+gender)),b={E:Math.round(r()*100),A:Math.round(r()*100),C:Math.round(r()*100),N:Math.round(r()*100),O:Math.round(r()*100)};if(gender==="女性")b.A=clamp(b.A+5,0,100);if(age>=35)b.C=clamp(b.C+8,0,100);if(age>=55){b.A=clamp(b.A+7,0,100);b.C=clamp(b.C+5,0,100)}return b}function pickName(gender,n){var names=gender==="女性"?femaleNames:(gender==="男性"?maleNames:neutralNames);return names[(n*7)%names.length]}function chooseWant(profile,regret,b,n,age){var score={};function add(k,v){score[k]=(score[k]||0)+v}add(regret.baseWant,3);add(profile.want,3);if(b.E>68)add("chat",2);if(b.E<32)add("listen",2);if(b.A>68)add("care",2);if(b.A<35)add("anger",1);if(b.C>68){add("logic",2);add("closure",2)}if(b.N<35){add("listen",2);add("care",1)}if(b.O>68){add("hope",2);add("memory",2)}if(age>=50){add("inherit",2);add("memory",1)}if(age<25){add("hope",1);add("listen",1)}var best=regret.baseWant,bestV=-999;Object.keys(score).forEach(function(k){var v=score[k]+((n%5)-2)*.2;if(v>bestV){best=k;bestV=v}});return best}function speechProfileFrom(type,b,want){var p=typeProfiles[type];return{talkAmount:b.E>65?"long":(b.E<35?"short":"normal"),directness:(p.style==="direct"||p.style==="rough"||p.style==="firm")?"direct":((p.style==="roundabout"||p.style==="quiet")?"roundabout":"soft"),asksBack:p.style==="question"||b.O>65||want==="logic",humor:p.style==="bright"||p.style==="irony"||want==="chat",silence:b.E<35||p.style==="quiet"||p.style==="short"}}
function makeGhost(n){var regret=regrets[n%regrets.length],genderRoll=n%20,gender=genderRoll<9?"女性":(genderRoll<18?"男性":"不明"),type=typeTags[n%typeTags.length],profile=typeProfiles[type],age=16+((n*13)%73),b=buildBig5(n,type,gender,age),want=chooseWant(profile,regret,b,n,age),name=pickName(gender,n);var g={id:n+1,name:name,gender:gender,age:age,type:type,big5:b,cause:causes[(n*5)%causes.length],regret:regret,regretName:regret.name,item:regret.item,face:faces[(n*11)%faces.length],maxHp:3+(n%3),maxTrust:4+(n%2),want:want,trapLabels:profile.trap,seed:hash(name+type+n)};g.speechProfile=speechProfileFrom(type,b,want);g.memo=regret.witness+(b.N<38?" 軽い励ましには傷つきやすい。":b.A>70?" 相手の反応を先に気にする。":b.O>70?" 話が少し飛びやすい。":b.C>70?" 役目や責任をまだ数えている。":" 本音を出すまで少し時間がかかる。");g.memo+=(age<20?" 言葉より表情が先に出る。":age<35?" 選ばなかった道を気にしている。":age<55?" 責任や役目の話に反応しやすい。":" 急かされると黙り込む。");g.memo+=" 避けたい話し方："+g.trapLabels.slice(0,2).join("・")+"。";var sample=profile.sample;g.opening=(g.speechProfile.directness==="roundabout"?"えっと……変な話かもしれません。 ":"")+regret.speech+" "+sample;return g}function buildGhosts(){var arr=[];for(var i=0;i<CONFIG.ghostCount;i++)arr.push(makeGhost(i));return arr}var ghosts=buildGhosts();
function start(){state.i=0;state.score=0;state.fails=0;state.compat={};state.paused=false;state.responseCounts={};state.failReasons=[];if(state.timer)clearInterval(state.timer);state.timer=setInterval(tick,100);loadGhost()}function loadGhost(){if(state.fails>=CONFIG.maxFails){end("ゲームオーバー","3回成仏に失敗しました。");return}if(state.i>=ghosts.length){end("全員成仏","最後のおばけまで面談しました。");return}state.current=ghosts[state.i%ghosts.length];state.resumeTime=CONFIG.resumeTime;state.answerTime=CONFIG.answerTime;state.maxHp=state.current.maxHp;state.maxTrust=state.current.maxTrust;state.hp=state.maxHp;state.trust=state.maxTrust;state.phase="resume";state.used={};state.recent=[];state.turns=0;state.stage="surface";renderResume();show("resume");updateHeader()}function renderResume(){var g=state.current;els.rName.textContent=g.name+"（"+g.type+"風）";els.rGender.textContent=g.gender;els.rAge.textContent=g.age+"歳";els.rCause.textContent=g.cause;els.rRegret.textContent=g.regretName;els.rItem.textContent=g.item;els.rMemo.textContent=g.memo}function begin(){if(state.phase!=="resume")return;state.phase="game";state.answerTime=CONFIG.answerTime;els.face.textContent=state.current.face;els.speech.textContent=state.current.opening;els.log.classList.remove("hidden");els.log.innerHTML='<span class="badge">おばけ</span>'+safe(state.current.opening);show("game");renderGame();updateHeader()}
function scoreChoice(c){if(c.role==="trap")return-99;var g=state.current,score=0;if(c.tag===g.want)score+=4;if(c.role==="watch")score+=1;if(c.role==="distrust")score-=2;if(g.speechProfile.silence&&c.responseType==="silence")score+=2;if(g.speechProfile.humor&&c.responseType==="joke")score+=2;if(g.speechProfile.directness==="direct"&&c.tone==="firm")score+=1;if(g.speechProfile.directness==="roundabout"&&c.responseType==="clarify")score-=1;if(g.trapLabels.indexOf("助言")>=0&&c.responseType==="advice")score-=3;return score}function renderGame(){var g=state.current;els.hp.textContent="成仏HP "+state.hp+"/"+state.maxHp+" / 不信HP "+state.trust+"/"+state.maxTrust+" / "+state.stage;els.round.textContent="失敗 "+state.fails+"/3";els.choices.innerHTML="";var pool=choicesBase.filter(function(c){return!state.used[c.text]});if(pool.length<4){state.used={};pool=choicesBase.slice()}pool=pool.map(function(c){c._score=scoreChoice(c);return c}).sort(function(a,b){return b._score-a._score});var choices=[],good=pool.filter(function(c){return c._score>2&&c.role!=="trap"}),neutral=pool.filter(function(c){return c.role==="watch"}),bad=pool.filter(function(c){return c.role==="distrust"}),trap=pool.filter(function(c){return c.role==="trap"});if(good[0])choices.push(good[0]);if(good[1])choices.push(good[1]);if(neutral[0])choices.push(neutral[(state.turns+g.id)%neutral.length]);if(state.trust<=2||state.turns>=3){if(trap[0])choices.push(trap[(g.id+state.turns)%trap.length])}else{if(bad[0])choices.push(bad[(g.id+state.turns)%bad.length])}while(choices.length<4&&pool.length){var cc=pool.shift();if(!choices.some(function(x){return x.text===cc.text}))choices.push(cc)}choices=shuffle(choices.slice(0,4),g.seed+state.turns*13+state.hp*7);choices.forEach(function(c,idx){var b=document.createElement("button");b.className="choice";b.innerHTML='<span class="choiceNum">'+(idx+1)+'</span><span class="choiceText">'+safe(c.text)+'</span>';b.onclick=function(){choose(c)};els.choices.appendChild(b)})}
function countResponse(t){state.responseCounts[t]=(state.responseCounts[t]||0)+1}function stageProgress(){if(state.hp<=1)state.stage="core";else if(state.turns>=2)state.stage="opening";else state.stage="surface"}function choose(c){if(state.phase!=="game"||state.paused)return;state.turns++;state.answerTime=CONFIG.answerTime;state.used[c.text]=true;countResponse(c.responseType);if(c.role==="trap"){fail(failHint(c,"trap"));return}var reply="",damage=0,distrust=0,s=scoreChoice(c);if(c.tag===state.current.want||s>=4){damage=2;reply=modeReplies[state.current.want].react;if(state.stage==="core")reply+=" それ、たぶん一番聞きたかったです。";toast("かなり届いた")}else if(c.role==="watch"){damage=state.stage==="surface"?0:1;reply=nextGhostQuestion(c);toast(damage?"少し届いた":"様子見")}else if(c.role==="distrust"||s<0){distrust=1;if(c.responseType==="advice")distrust++;reply=smallReject(c);toast("不信HPが減った")}else{damage=1;reply="そういう見方も、あるんですね。少し続けてもいいですか。";toast("少し届いた")}state.hp=clamp(state.hp-damage,0,state.maxHp);state.trust=clamp(state.trust-distrust,0,state.maxTrust);stageProgress();els.speech.textContent=reply;els.log.innerHTML='<span class="badge">あなた</span>'+safe(c.text)+'<br><span class="badge">おばけ</span>'+safe(reply);if(state.hp<=0){ascend();return}if(state.trust<=0){fail(failHint(c,"distrust"));return}renderGame();updateHeader()}
function nextGhostQuestion(c){var g=state.current,q=modeReplies[g.want].q;if(g.speechProfile.asksBack&&c.responseType==="question")return"質問で返されると、ちょっと考えますね。 "+q;if(g.speechProfile.silence&&c.responseType==="silence")return"……待ってくれるの、助かります。 "+q;if(g.speechProfile.humor&&c.responseType==="joke")return"そういう普通の話、ちょっと安心します。 "+q;return q}function smallReject(c){if(c.responseType==="advice")return"どうしたらいいか、じゃないんです。もう、どうにもできないからここにいるんです。";if(c.responseType==="clarify")return"まだ分けられないです。ぐちゃぐちゃのまま、少し置かせてほしかった。";if(c.responseType==="support")return"励ましは、ありがたいんですけど……今は少し遠いです。";return"……すみません。今の言い方だと、少し遠く感じます。"}function failHint(c,kind){var g=state.current,base=modeReplies[g.want].fail;if(c&&c.responseType==="advice")base="どうしたらいいか、じゃなかったんです。もう終わってるから。 "+base;else if(c&&c.responseType==="clarify")base="まだ整理できてないんです。先に分けられると、置いていかれます。 "+base;else if(c&&c.responseType==="support"&&c.tag==="bad")base="前向きって言われると、今の私がダメみたいで。 "+base;if(kind==="trap")base="それを言われると、もう話せないです。 "+base;state.failReasons.push(base);return base}function ascend(){var g=state.current;state.score++;state.i++;state.compat[g.type]=(state.compat[g.type]||0)+1;var reply=modeReplies[g.want].finish;if(g.speechProfile.talkAmount==="short")reply="……はい。"+reply;els.speech.textContent=reply;els.choices.innerHTML="";toast("成仏しました");state.phase="transition";setTimeout(loadGhost,950)}function fail(reason){state.fails++;state.i++;els.speech.textContent=reason;els.log.innerHTML='<span class="badge">おばけ</span>'+safe(reason);els.choices.innerHTML="";toast("成仏失敗 "+state.fails+"/3");state.phase="transition";setTimeout(loadGhost,1300)}function topResponse(){var best="",bestN=0;Object.keys(state.responseCounts).forEach(function(k){if(state.responseCounts[k]>bestN){best=k;bestN=state.responseCounts[k]}});return{key:best,count:bestN,label:best?responseInfo[best].label:"判定なし",text:best?responseInfo[best].result:"まだ応答傾向は薄めです。"}}function end(title,text){state.phase="result";if(state.timer)clearInterval(state.timer);els.resultTitle.textContent=title;els.resultText.textContent=text;els.finalScore.textContent=state.score;var best="",bestN=0;Object.keys(state.compat).forEach(function(k){if(state.compat[k]>bestN){best=k;bestN=state.compat[k]}});var rank=state.score>=20?"霊界面談主任クラス":state.score>=12?"かなり聞ける面談官":state.score>=6?"相手を選べば強い面談官":state.score>=2?"まだ探り探りの面談官":"これからの新人面談官",resp=topResponse(),failLast=state.failReasons.length?state.failReasons[state.failReasons.length-1]:"大きな失敗ヒントはまだありません。";els.compat.innerHTML="<strong>"+safe(rank)+"</strong><br>相性がよかった性格傾向："+safe(best?best+"風（"+bestN+"体）":"判定なし")+"<br>よく使った応答："+safe(resp.label)+"<br>"+safe(resp.text)+"<br><br><strong>最後に残ったヒント</strong><br>"+safe(failLast);show("result");updateHeader()}function tick(){if(state.paused)return;if(state.phase==="resume"){state.resumeTime=Math.max(0,state.resumeTime-.1);if(state.resumeTime<=0)begin()}else if(state.phase==="game"){state.answerTime=Math.max(0,state.answerTime-.1);if(state.answerTime<=0)fail("返事を待ってる時間が、少し長すぎました。……何か言ってほしかったです。")}updateHeader()}
els.startBtn.onclick=start;els.skipBtn.onclick=begin;els.restartBtn.onclick=start;els.pauseBtn.onclick=function(){if(state.phase==="title"||state.phase==="result")return;state.paused=true;els.pauseOverlay.classList.remove("hidden")};els.resumeBtn.onclick=function(){state.paused=false;els.pauseOverlay.classList.add("hidden")};els.debug.textContent="JS起動済み。v24";updateHeader();})();
